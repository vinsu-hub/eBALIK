<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In | eBALIK</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body class="login-body">
  <div class="card login-card">
    <div class="card-body p-5">
      <div class="text-center mb-4">
        <i class="bi bi-book-half login-brand"></i>
        <h3 class="login-title">eBALIK</h3>
        <p class="login-subtitle">Book Automated Library Inventory Keeper</p>
      </div>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="alert alert-{{ category }} alert-dismissible fade show py-2" role="alert">
              {{ message }}
              <button type="button" class="btn-close btn-close-sm" data-bs-dismiss="alert"></button>
            </div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <form method="POST" action="{{ url_for('auth.login') }}">
        <div class="mb-3">
          <label for="username" class="input-label">Username</label>
          <input type="text" class="form-control" id="username" name="username" required autofocus
                 style="height: 2.5rem; border-radius: var(--radius-md);">
        </div>
        <div class="mb-4">
          <label for="password" class="input-label">Password</label>
          <input type="password" class="form-control" id="password" name="password" required
                 style="height: 2.5rem; border-radius: var(--radius-md);">
        </div>
        <button type="submit" class="btn btn-primary w-100" style="height: 2.75rem; border-radius: var(--radius-md); font-weight: 600;">
          Sign In
        </button>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
